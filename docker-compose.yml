services:
  isaac:
    image: nvcr.io/nvidia/isaac-sim:5.1.0
    container_name: isaac-sim
    runtime: nvidia
    user: "0:0"
    network_mode: host
    stdin_open: true
    tty: true
    shm_size: "8gb"
    environment:
      ACCEPT_EULA: "Y"
      PRIVACY_CONSENT: "Y"
      OMNI_ENV_ACCEPT_EULA: "Y"
      OMNI_ENV_PRIVACY_CONSENT: "Y"
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-0}"
      RMW_IMPLEMENTATION: "rmw_fastrtps_cpp"
    volumes:
      - ./docker/isaac-sim/cache/main:/isaac-sim/.cache:rw
      - ./docker/isaac-sim/cache/computecache:/isaac-sim/.nv/ComputeCache:rw
      - ./docker/isaac-sim/logs:/isaac-sim/.nvidia-omniverse/logs:rw
      - ./docker/isaac-sim/config:/isaac-sim/.nvidia-omniverse/config:rw
      - ./docker/isaac-sim/data:/isaac-sim/.local/share/ov/data:rw
      - ./docker/isaac-sim/pkg:/isaac-sim/.local/share/ov/pkg:rw
      - ./docker/isaac-sim/documents:/isaac-sim/Documents:rw
      - ./shared:/shared:rw
    command:
      - --/app/livestream/publicEndpointAddress=${PUBLIC_IP}
      - --/app/livestream/port=49100
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  isaac-webrtc:
    image: nvcr.io/nvidia/isaac-sim:5.1.0
    container_name: isaac-sim-webrtc
    runtime: nvidia
    user: "0:0"
    network_mode: host
    stdin_open: true
    tty: true
    shm_size: "8gb"
    profiles: ["webrtc"]
    environment:
      ACCEPT_EULA: "Y"
      PRIVACY_CONSENT: "Y"
      OMNI_ENV_ACCEPT_EULA: "Y"
      OMNI_ENV_PRIVACY_CONSENT: "Y"
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-0}"
      RMW_IMPLEMENTATION: "rmw_fastrtps_cpp"
    volumes:
      - ./docker/isaac-sim/cache/main:/isaac-sim/.cache:rw
      - ./docker/isaac-sim/cache/computecache:/isaac-sim/.nv/ComputeCache:rw
      - ./docker/isaac-sim/logs:/isaac-sim/.nvidia-omniverse/logs:rw
      - ./docker/isaac-sim/config:/isaac-sim/.nvidia-omniverse/config:rw
      - ./docker/isaac-sim/data:/isaac-sim/.local/share/ov/data:rw
      - ./docker/isaac-sim/pkg:/isaac-sim/.local/share/ov/pkg:rw
      - ./docker/isaac-sim/documents:/isaac-sim/Documents:rw
      - ./shared:/shared:rw
    command:
      - --/app/livestream/publicEndpointAddress=${PUBLIC_IP}
      - --/app/livestream/port=${ISAAC_STREAM_PORT:-49100}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  isaac-gui:
    image: nvcr.io/nvidia/isaac-sim:5.1.0
    container_name: isaac-sim-gui
    runtime: nvidia
    user: "0:0"
    network_mode: host
    stdin_open: true
    tty: true
    shm_size: "8gb"
    profiles: ["gui"]
    entrypoint: ["/isaac-sim/runapp.sh"]
    environment:
      ACCEPT_EULA: "Y"
      PRIVACY_CONSENT: "Y"
      OMNI_ENV_ACCEPT_EULA: "Y"
      OMNI_ENV_PRIVACY_CONSENT: "Y"
      DISPLAY: "${DISPLAY:-:0}"
      QT_X11_NO_MITSHM: "1"
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-0}"
      RMW_IMPLEMENTATION: "rmw_fastrtps_cpp"
    volumes:
      - ./docker/isaac-sim/cache/main:/isaac-sim/.cache:rw
      - ./docker/isaac-sim/cache/computecache:/isaac-sim/.nv/ComputeCache:rw
      - ./docker/isaac-sim/logs:/isaac-sim/.nvidia-omniverse/logs:rw
      - ./docker/isaac-sim/config:/isaac-sim/.nvidia-omniverse/config:rw
      - ./docker/isaac-sim/data:/isaac-sim/.local/share/ov/data:rw
      - ./docker/isaac-sim/pkg:/isaac-sim/.local/share/ov/pkg:rw
      - ./docker/isaac-sim/documents:/isaac-sim/Documents:rw
      - ./shared:/shared:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  isaac-headless:
    image: nvcr.io/nvidia/isaac-sim:5.1.0
    container_name: isaac-sim-headless
    runtime: nvidia
    user: "0:0"
    network_mode: host
    stdin_open: true
    tty: true
    shm_size: "8gb"
    profiles: ["headless"]
    entrypoint: ["bash", "-c"]
    command:
      - |
        source /isaac-sim/setup_ros_env.sh
        /isaac-sim/python.sh /shared/carter_headless.py
    environment:
      ACCEPT_EULA: "Y"
      PRIVACY_CONSENT: "Y"
      OMNI_ENV_ACCEPT_EULA: "Y"
      OMNI_ENV_PRIVACY_CONSENT: "Y"
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-0}"
      RMW_IMPLEMENTATION: "rmw_fastrtps_cpp"
      FASTRTPS_DEFAULT_PROFILES_FILE: "/shared/fastdds_no_shm.xml"
    volumes:
      - ./docker/isaac-sim/cache/main:/isaac-sim/.cache:rw
      - ./docker/isaac-sim/cache/computecache:/isaac-sim/.nv/ComputeCache:rw
      - ./docker/isaac-sim/logs:/isaac-sim/.nvidia-omniverse/logs:rw
      - ./docker/isaac-sim/config:/isaac-sim/.nvidia-omniverse/config:rw
      - ./docker/isaac-sim/data:/isaac-sim/.local/share/ov/data:rw
      - ./docker/isaac-sim/pkg:/isaac-sim/.local/share/ov/pkg:rw
      - ./docker/isaac-sim/documents:/isaac-sim/Documents:rw
      - ./shared:/shared:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ros2-perception:
    build:
      context: .
      dockerfile: Dockerfile.ros2
    container_name: ros2-jazzy-perception
    network_mode: host
    stdin_open: true
    tty: true
    environment:
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-0}"
      RMW_IMPLEMENTATION: "rmw_fastrtps_cpp"
      FASTRTPS_DEFAULT_PROFILES_FILE: "/shared/fastdds_no_shm.xml"
    volumes:
      - ./ros2_ws:/workspaces/ros2_ws
      - ./shared:/shared
    working_dir: /workspaces/ros2_ws
    command: bash

  ros2-navigation:
    build:
      context: .
      dockerfile: Dockerfile.ros2
    container_name: ros2-jazzy-navigation
    network_mode: host
    stdin_open: true
    tty: true
    environment:
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-0}"
      RMW_IMPLEMENTATION: "rmw_fastrtps_cpp"
      FASTRTPS_DEFAULT_PROFILES_FILE: "/shared/fastdds_no_shm.xml"
    volumes:
      - ./ros2_ws:/workspaces/ros2_ws
      - ./shared:/shared
    working_dir: /workspaces/ros2_ws
    command: bash

  ros2-isaac:
    build:
      context: .
      dockerfile: Dockerfile.ros2.isaac
      args:
        ROS_DISTRO: "jazzy"
    container_name: ros2-isaac
    network_mode: host
    stdin_open: true
    tty: true
    environment:
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-0}"
      RMW_IMPLEMENTATION: "rmw_fastrtps_cpp"
      FASTRTPS_DEFAULT_PROFILES_FILE: "/shared/fastdds_no_shm.xml"
      ROS_DISTRO: "jazzy"
    volumes:
      - ./ros2_ws:/workspaces/ros2_ws
      - ./shared:/shared
    working_dir: /workspaces/ros2_ws
    command: ["sleep", "infinity"]

  ros2-yolo:
    build:
      context: .
      dockerfile: Dockerfile.ros2.yolo
      args:
        ROS_DISTRO: "jazzy"
    container_name: ros2-yolo
    profiles: ["yolo"]
    runtime: nvidia
    network_mode: host
    stdin_open: true
    tty: true
    environment:
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-0}"
      RMW_IMPLEMENTATION: "rmw_fastrtps_cpp"
      FASTRTPS_DEFAULT_PROFILES_FILE: "/shared/fastdds_no_shm.xml"
      ROS_DISTRO: "jazzy"
      PYTHONUNBUFFERED: "1"
      YOLO_CONFIG_DIR: "/tmp/Ultralytics"
    volumes:
      - ./ros2_ws:/workspaces/ros2_ws
      - ./shared:/shared
    working_dir: /workspaces/ros2_ws
    command: ["sleep", "infinity"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ros2-humble-isaac:
    build:
      context: .
      dockerfile: Dockerfile.ros2.humble
    container_name: ros2-humble-isaac
    network_mode: host
    stdin_open: true
    tty: true
    environment:
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-0}"
      RMW_IMPLEMENTATION: "rmw_fastrtps_cpp"
      FASTRTPS_DEFAULT_PROFILES_FILE: "/shared/fastdds_no_shm.xml"
      ROS_DISTRO: "humble"
    volumes:
      - ./ros2_ws:/workspaces/ros2_ws
      - ./shared:/shared
    working_dir: /workspaces/ros2_ws
    command: bash
